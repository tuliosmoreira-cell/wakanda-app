<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WAKANDA - OS</title>
    <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Syncopate:wght@700&family=Inter:wght@400;900&display=swap" rel="stylesheet">
    <style>
        body { background-color: #000; color: #fff; font-family: 'Inter', sans-serif; }
        .font-tech { font-family: 'Syncopate', sans-serif; }
        .gold-grad { background: linear-gradient(135deg, #bf953f, #fcf6ba, #aa771c); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        .card { background: #0a0a0a; border: 1px solid #1a1a1a; border-radius: 1.5rem; }
        .nav-active { color: #bf953f; border-top: 2px solid #bf953f; }
    </style>
</head>
<body>
    <div id="root"></div>
    <script type="text/babel">
        const { useState } = React;

        function App() {
            const [view, setView] = useState('LANDING');
            const [tab, setTab] = useState('RANKING'); // RANKING, MISSÕES, EVENTOS
            const [user, setUser] = useState(null);
            
            const [members, setMembers] = useState([
                { id: 1, name: 'Tulipa', role: 'ADM', score: 0 },
                { id: 2, name: 'Anderson', role: 'USER', score: 0 },
                { id: 3, name: 'Yuri', role: 'USER', score: 0 },
                { id: 4, name: 'Negão', role: 'USER', score: 0 },
                { id: 5, name: 'Léo', role: 'USER', score: 0 }
            ]);

            const [missions, setMissions] = useState([
                { id: 1, title: 'Presença no Rolê', points: 50, status: 'Ativa' }
            ]);

            const updateScore = (id, val) => {
                setMembers(prev => prev.map(m => m.id === id ? { ...m, score: m.score + val } : m));
            };

            const addMission = (title, pts) => {
                setMissions([...missions, { id: Date.now(), title, points: pts, status: 'Ativa' }]);
            };

            if (view === 'LANDING') return (
                <div className="flex flex-col items-center justify-center min-h-screen p-8 text-center">
                    <img src="image_7b4123.png" className="w-48 mb-10" alt="Pantera" />
                    <h1 className="text-3xl font-tech gold-grad mb-12">WAKANDA</h1>
                    <button onClick={() => setView('LOGIN')} className="w-full bg-white text-black py-4 rounded-full font-black">ENTRAR NO SISTEMA</button>
                </div>
            );

            if (view === 'LOGIN') return (
                <div className="flex flex-col justify-center min-h-screen p-8 space-y-4">
                    <h2 className="font-tech text-center mb-6">IDENTIFIQUE-SE</h2>
                    <select id="u" className="w-full bg-zinc-900 p-5 rounded-2xl outline-none">
                        {members.map(m => <option key={m.id} value={m.name}>{m.name}</option>)}
                    </select>
                    <input id="p" type="password" placeholder="Sua senha" className="w-full bg-zinc-900 p-5 rounded-2xl outline-none" />
                    <button onClick={() => {
                        const n = document.getElementById('u').value;
                        const s = document.getElementById('p').value;
                        if (n === 'Tulipa' && s !== 'tulipa2003') return alert("Erro");
                        setUser(members.find(m => m.name === n));
                        setView('APP');
                    }} className="w-full bg-purple-900 py-4 rounded-2xl font-bold">LOGAR</button>
                </div>
            );

            return (
                <div className="max-w-md mx-auto min-h-screen flex flex-col pb-24">
                    <header className="p-6 flex justify-between items-center border-b border-zinc-900">
                        <span className="font-tech text-[10px] gold-grad">WKND OS</span>
                        {user.role === 'ADM' && <button onClick={() => setView('ADMIN')} className="bg-white text-black px-3 py-1 rounded-full text-[10px] font-black uppercase">Painel ADM</button>}
                    </header>

                    <main className="p-6">
                        {tab === 'RANKING' && (
                            <div className="space-y-6">
                                <div className="card p-6 border-l-4 border-yellow-600">
                                    <p className="text-zinc-500 text-[10px] uppercase tracking-widest mb-1">Seu Score</p>
                                    <div className="text-4xl font-black">{user.score} <span className="text-xs text-zinc-500">PTS</span></div>
                                </div>
                                <h3 className="font-tech text-[10px] text-zinc-600 uppercase">Ranking Geral</h3>
                                {members.sort((a,b) => b.score - a.score).map((m, i) => (
                                    <div key={m.id} className="flex justify-between p-4 card items-center">
                                        <span className="text-sm font-bold">{i+1}. {m.name}</span>
                                        <span className="text-yellow-600 font-bold">{m.score}</span>
                                    </div>
                                ))}
                            </div>
                        )}

                        {tab === 'MISSÕES' && (
                            <div className="space-y-4">
                                <h3 className="font-tech text-[10px] text-zinc-600 uppercase mb-6 text-center">Missões Ativas</h3>
                                {missions.map(m => (
                                    <div key={m.id} className="card p-5 border-l-4 border-purple-900">
                                        <h4 className="font-bold text-sm mb-1">{m.title}</h4>
                                        <p className="text-zinc-500 text-[10px]">Recompensa: <span className="text-purple-400">+{m.points} pts</span></p>
                                    </div>
                                ))}
                            </div>
                        )}

                        {tab === 'EVENTOS' && (
                            <div className="text-center py-20">
                                <p className="text-zinc-600 font-tech text-xs">Nenhum evento agendado</p>
                            </div>
                        )}
                    </main>

                    {/* BARRA DE NAVEGAÇÃO */}
                    <nav className="fixed bottom-0 left-0 right-0 bg-black/90 border-t border-zinc-900 flex justify-around p-4 backdrop-blur-md">
                        {['RANKING', 'MISSÕES', 'EVENTOS'].map(t => (
                            <button key={t} onClick={() => setTab(t)} className={`text-[10px] font-black tracking-widest ${tab === t ? 'text-yellow-500' : 'text-zinc-600'}`}>
                                {t}
                            </button>
                        ))}
                    </nav>

                    {/* ÁREA ADM (MODAL) */}
                    {view === 'ADMIN' && (
                        <div className="fixed inset-0 bg-black z-50 p-6 overflow-y-auto">
                            <div className="flex justify-between items-center mb-10">
                                <h2 className="font-tech gold-grad">CONTROLE TULIPA</h2>
                                <button onClick={() => setView('APP')} className="text-xs underline">Fechar</button>
                            </div>
                            
                            <section className="mb-10">
                                <h3 className="text-[10px] text-zinc-500 uppercase mb-4">Gerenciar Pontos</h3>
                                {members.map(m => (
                                    <div key={m.id} className="flex items-center justify-between p-4 card mb-2">
                                        <span className="text-sm font-bold">{m.name}</span>
                                        <div className="flex gap-2">
                                            <button onClick={() => updateScore(m.id, -10)} className="w-8 h-8 bg-zinc-900 rounded-lg">-</button>
                                            <button onClick={() => updateScore(m.id, 10)} className="w-8 h-8 bg-yellow-600 text-black rounded-lg">+</button>
                                        </div>
                                    </div>
                                ))}
                            </section>

                            <section>
                                <h3 className="text-[10px] text-zinc-500 uppercase mb-4">Lançar Nova Missão</h3>
                                <div className="card p-4 space-y-3">
                                    <input id="mT" placeholder="Nome da Missão" className="w-full bg-zinc-900 p-3 rounded-xl text-xs outline-none" />
                                    <input id="mP" type="number" placeholder="Pontos" className="w-full bg-zinc-900 p-3 rounded-xl text-xs outline-none" />
                                    <button onClick={() => {
                                        addMission(document.getElementById('mT').value, document.getElementById('mP').value);
                                        alert("Missão lançada!");
                                    }} className="w-full bg-purple-900 py-3 rounded-xl text-xs font-bold">POSTAR MISSÃO</button>
                                </div>
                            </section>
                        </div>
                    )}
                </div>
            );
        }
        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
