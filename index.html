<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WAKANDA - OS</title>
    <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background-color: #000; color: #fff; font-family: ui-sans-serif, system-ui; }
        .gold-text { background: linear-gradient(135deg, #bf953f, #aa771c); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        .card { background: #0a0a0a; border: 1px solid #1a1a1a; border-radius: 1.5rem; }
    </style>
</head>
<body>
    <div id="root"></div>
    <script type="text/babel">
        const { useState } = React;

        const INITIAL_MEMBERS = [
            { id: 1, name: 'Tulipa', role: 'ADM', score: 0 },
            { id: 2, name: 'Anderson', role: 'USER', score: 0 },
            { id: 3, name: 'Yuri', role: 'USER', score: 0 },
            { id: 4, name: 'Thales', role: 'USER', score: 0 },
            { id: 5, name: 'Negão', role: 'USER', score: 0 },
            { id: 6, name: 'Léo', role: 'USER', score: 0 },
            { id: 7, name: 'Júlio', role: 'USER', score: 0 },
            { id: 8, name: 'Radar', role: 'USER', score: 0 },
            { id: 9, name: 'Heltin', role: 'USER', score: 0 }
        ];

        function App() {
            const [view, setView] = useState('LANDING');
            const [user, setUser] = useState(null);
            const [members, setMembers] = useState(INITIAL_MEMBERS);

            const updateScore = (id, val) => {
                setMembers(prev => prev.map(m => m.id === id ? { ...m, score: m.score + val } : m));
            };

            return (
                <div className="max-w-md mx-auto min-h-screen flex flex-col p-4">
                    
                    {/* 1. CAPA */}
                    {view === 'LANDING' && (
                        <div className="flex-1 flex flex-col items-center justify-center text-center">
                            <img src="image_7b4123.png" className="w-48 mb-8" alt="Pantera" />
                            <h1 className="text-4xl font-black gold-text mb-12">WAKANDA</h1>
                            <button onClick={() => setView('PASS_CHECK')} className="w-full bg-white text-black py-4 rounded-full font-bold uppercase tracking-tighter">Acessar</button>
                        </div>
                    )}

                    {/* 2. SENHA DO GRUPO */}
                    {view === 'PASS_CHECK' && (
                        <div className="flex-1 flex flex-col justify-center">
                            <p className="text-center text-zinc-500 text-xs mb-4">SENHA DO GRUPO</p>
                            <input type="password" autoFocus className="bg-transparent border-b border-purple-900 w-full text-center text-3xl p-2 outline-none focus:border-yellow-600" 
                                onChange={(e) => e.target.value.toLowerCase() === 'wakanda' && setView('LOGIN')} />
                        </div>
                    )}

                    {/* 3. LOGIN */}
                    {view === 'LOGIN' && (
                        <div className="flex-1 flex flex-col justify-center space-y-4">
                            <select id="userSelect" className="w-full bg-zinc-900 p-4 rounded-2xl outline-none">
                                {members.map(m => <option key={m.id} value={m.name}>{m.name}</option>)}
                            </select>
                            <input id="userPass" type="password" placeholder="Sua senha" className="w-full bg-zinc-900 p-4 rounded-2xl outline-none" />
                            <button onClick={() => {
                                const n = document.getElementById('userSelect').value;
                                const p = document.getElementById('userPass').value;
                                if (n === 'Tulipa' && p !== 'tulipa2003') return alert("Acesso negado");
                                setUser(members.find(m => m.name === n));
                                setView('DASHBOARD');
                            }} className="w-full bg-purple-900 py-4 rounded-2xl font-bold">ENTRAR</button>
                        </div>
                    )}

                    {/* 4. DASHBOARD (Onde o botão ADM agora funciona) */}
                    {view === 'DASHBOARD' && (
                        <div className="flex-1">
                            <div className="flex justify-between items-center mb-8">
                                <span className="font-bold gold-text uppercase text-xs">Wakanda OS</span>
                                {user.role === 'ADM' && (
                                    <button 
                                        onClick={() => setView('ADMIN')} 
                                        className="bg-yellow-600 text-black px-4 py-1 rounded-full text-[10px] font-black uppercase shadow-lg shadow-yellow-600/20 active:scale-95 transition-transform"
                                    >
                                        Painel ADM
                                    </button>
                                )}
                            </div>

                            <div className="card p-6 mb-8">
                                <p className="text-zinc-500 text-[10px] uppercase mb-1">Membro: {user.name}</p>
                                <div className="text-4xl font-black tracking-tighter">{user.score} <span className="text-xs text-zinc-500">PTS</span></div>
                            </div>
