<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WAKANDA OS</title>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Syncopate:wght@700&family=Inter:wght@400;900&display=swap" rel="stylesheet">
    <style>
        body { background-color: #000; color: #fff; font-family: 'Inter', sans-serif; }
        .font-tech { font-family: 'Syncopate', sans-serif; }
        .gold-grad { background: linear-gradient(135deg, #bf953f, #fcf6ba, #aa771c); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        .card { background: #0a0a0a; border: 1px solid #1a1a1a; border-radius: 1.5rem; }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect } = React;

        function App() {
            const [view, setView] = useState('LANDING');
            const [tab, setTab] = useState('RANKING');
            const [user, setUser] = useState(null);
            
            const [members, setMembers] = useState([
                { id: 1, name: 'Tulipa', role: 'ADM', score: 0 },
                { id: 2, name: 'Anderson', role: 'USER', score: 0 },
                { id: 3, name: 'Yuri', role: 'USER', score: 0 },
                { id: 4, name: 'Negão', role: 'USER', score: 0 },
                { id: 5, name: 'Thales', role: 'USER', score: 0 }
            ]);

            const updateScore = (id, val) => {
                setMembers(prev => prev.map(m => m.id === id ? { ...m, score: m.score + val } : m));
            };

            if (view === 'LANDING') return (
                <div className="flex flex-col items-center justify-center min-h-screen p-8">
                    <h1 className="text-4xl font-tech gold-grad mb-16 tracking-tighter italic">WAKANDA</h1>
                    <button onClick={() => setView('LOGIN')} className="w-full bg-white text-black py-5 rounded-full font-black text-xs tracking-widest">ENTRAR NO SISTEMA</button>
                </div>
            );

            if (view === 'LOGIN') return (
                <div className="flex flex-col justify-center min-h-screen p-8 space-y-4">
                    <h2 className="font-tech text-center mb-8 gold-grad text-sm uppercase">Autenticação</h2>
                    <select id="u" className="w-full p-5 rounded-3xl bg-zinc-900 border border-zinc-800 text-white">
                        {members.map(m => <option key={m.id} value={m.name}>{m.name}</option>)}
                    </select>
                    <input id="p" type="password" placeholder="Código de Acesso" className="w-full p-5 rounded-3xl bg-zinc-900 border border-zinc-800 text-white" />
                    <button onClick={() => {
                        const n = document.getElementById('u').value;
                        const s = document.getElementById('p').value;
                        if (n === 'Tulipa' && s !== 'tulipa2003') return alert("Código Incorreto");
                        setUser(members.find(m => m.name === n));
                        setView('APP');
                    }} className="w-full bg-zinc-100 text-black py-5 rounded-3xl font-black text-xs">ACESSAR</button>
                </div>
            );

            return (
                <div className="max-w-md mx-auto min-h-screen flex flex-col pb-24">
                    <header className="p-6 flex justify-between items-center border-b border-zinc-900 sticky top-0 bg-black">
                        <span className="font-tech text-[9px] gold-grad tracking-widest">WKND.OS_v2</span>
                        {user.role === 'ADM' && (
                            <button onClick={() => setView('ADMIN')} className="bg-yellow-600 text-black px-4 py-2 rounded-full text-[9px] font-black uppercase">PAINEL ADM</button>
                        )}
                    </header>

                    <main className="p-6">
                        <div className="card p-8 border-t border-zinc-800 mb-8 text-center">
                            <p className="text-zinc-600 text-[10px] uppercase font-tech mb-2 tracking-widest">Sua Pontuação</p>
                            <div className="text-5xl font-black">{members.find(m => m.id === user.id)?.score || 0}</div>
                        </div>
                        
                        <h3 className="font-tech text-[10px] text-zinc-700 uppercase mb-4 tracking-widest">Ranking Atual</h3>
                        {members.sort((a,b) => b.score - a.score).map((m, i) => (
                            <div key={m.id} className="flex justify-between p-5 card items-center mb-3">
                                <span className="text-sm font-bold text-zinc-300">#0{i+1} {m.name}</span>
                                <span className="text-yellow-600 font-black text-xs font-tech">{m.score} PTS</span>
                            </div>
                        ))}
                    </main>

                    {view === 'ADMIN' && (
                        <div className="fixed inset-0 bg-black z-50 p-6 overflow-y-auto">
                            <div className="flex justify-between items-center mb-10">
                                <h2 className="font-tech gold-grad text-xs tracking-widest">CONTROLE</h2>
                                <button onClick={() => setView('APP')} className="text-[10px] font-black border border-zinc-800 px-6 py-2 rounded-full">VOLTAR</button>
                            </div>
                            {members.map(m => (
                                <div key={m.id} className="flex items-center justify-between p-4 card mb-3">
                                    <span className="text-xs font-bold">{m.name}</span>
                                    <div className="flex gap-2">
                                        <button onClick={() => updateScore(m.id, -5)} className="w-10 h-10 bg-zinc-900 rounded-xl font-bold border border-zinc-800">-5</button>
                                        <button onClick={() => updateScore(m.id, 5)} className="w-10 h-10 bg-yellow-600 text-black rounded-xl font-bold">+5</button>
                                    </div>
                                </div>
                            ))}
                        </div>
                    )}
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
