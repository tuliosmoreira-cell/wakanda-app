<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WAKANDA - OS</title>
    <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Syncopate:wght@400;700&family=Inter:wght@300;600;900&display=swap" rel="stylesheet">
    <style>
        body { background-color: #000; color: #fff; font-family: 'Inter', sans-serif; }
        .font-tech { font-family: 'Syncopate', sans-serif; text-transform: uppercase; letter-spacing: 0.2em; }
        .gold-grad { background: linear-gradient(135deg, #bf953f 0%, #fcf6ba 45%, #b38728 60%, #aa771c 100%); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        .bg-gold { background: linear-gradient(135deg, #bf953f, #aa771c); }
        .card { background: #0a0a0a; border: 1px solid #1a1a1a; border-radius: 2rem; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        .btn-purple { background: linear-gradient(135deg, #6d28d9, #4c1d95); box-shadow: 0 4px 15px rgba(109,40,217,0.3); }
        .fade-in { animation: fadeIn 0.5s ease-out; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body>
    <div id="root"></div>
    <script type="text/babel">
        const { useState, useEffect } = React;
        const INITIAL_MEMBERS = [
            { id: 1, name: 'Tulipa', role: 'ADM', score: 0 },
            { id: 2, name: 'Anderson', role: 'USER', score: 0 },
            { id: 3, name: 'Yuri', role: 'USER', score: 0 },
            { id: 4, name: 'Thales', role: 'USER', score: 0 },
            { id: 5, name: 'Negão', role: 'USER', score: 0 },
            { id: 6, name: 'Léo', role: 'USER', score: 0 },
            { id: 7, name: 'Júlio', role: 'USER', score: 0 },
            { id: 8, name: 'Radar', role: 'USER', score: 0 },
            { id: 9, name: 'Heltin', role: 'USER', score: 0 }
        ];

        function App() {
            const [view, setView] = useState('LANDING');
            const [user, setUser] = useState(null);
            const [members, setMembers] = useState(INITIAL_MEMBERS);

            const updateScore = (id, val) => {
                setMembers(prev => prev.map(m => m.id === id ? { ...m, score: m.score + val } : m));
            };

            return (
                <div className="max-w-md mx-auto min-h-screen flex flex-col p-6 fade-in border-x border-zinc-900/50">
                    
                    {view === 'LANDING' && (
                        <div className="flex-1 flex flex-col items-center justify-center text-center">
                            <img src="image_7b4123.png" className="w-56 h-56 object-contain mb-16 shadow-[0_0_60px_rgba(109,40,217,0.1)]" alt="Pantera" />
                            <h1 className="text-4xl font-bold font-tech gold-grad mb-2">WAKANDA</h1>
                            <p className="text-zinc-600 text-[10px] uppercase letter-spacing-[0.5em] mb-16 italic">System OS</p>
                            <button onClick={() => setView('PASS_CHECK')} className="w-full bg-white text-black py-4 rounded-full font-black uppercase text-xs tracking-widest hover:scale-105 active:scale-95 transition-all">Acessar Sistema</button>
                        </div>
                    )}

                    {view === 'PASS_CHECK' && (
                        <div className="flex-1 flex flex-col justify-center items-center">
                            <p className="text-zinc-600 text-xs mb-6 uppercase font-tech">Senha do Círculo</p>
                            <input type="password" autoFocus className="bg-transparent border-b-2 border-purple-900 w-full text-center text-5xl p-2 outline-none focus:border-yellow-600 transition-all font-tech tracking-widest text-purple-200" 
                                onChange={(e) => e.target.value.toLowerCase() === 'wakanda' && setView('LOGIN')} />
                        </div>
                    )}

                    {view === 'LOGIN' && (
                        <div className="flex-1 flex flex-col justify-center space-y-6">
                            <h2 className="text-2xl font-bold font-tech text-center gold-grad">Identificação</h2>
                            <select id="userSelect" className="w-full bg-zinc-950 p-5 rounded-2xl outline-none border border-zinc-900 appearance-none text-zinc-300">
                                {members.map(m => <option key={m.id} value={m.name}>{m.name}</option>)}
                            </select>
                            <input id="userPass" type="password" placeholder="Senha Exclusiva" className="w-full bg-zinc-950 p-5 rounded-2xl outline-none border border-zinc-900" />
                            <button onClick={() => {
                                const n = document.getElementById('userSelect').value;
                                const p = document.getElementById('userPass').value;
                                if (n === 'Tulipa' && p !== 'tulipa2003') return alert("Senha ADM inválida");
                                setUser(members.find(m => m.name === n));
                                setView('DASHBOARD');
                            }} className="w-full btn-purple py-5 rounded-3xl font-bold uppercase tracking-widest text-xs hover:shadow-purple-900/50 transition">Entrar</button>
                        </div>
                    )}

                    {view === 'DASHBOARD' && (
                        <div className="flex-1">
                            <div className="flex justify-between items-center mb-10 pb-4 border-b border-zinc-900">
                                <span className="font-bold gold-grad uppercase font-tech text-xs">WKND System</span>
                                {user.role === 'ADM' && (
                                    <button 
                                        onClick={() => setView('ADMIN')} 
                                        className="bg-gold text-black px-5 py-1.5 rounded-full text-[10px] font-black uppercase tracking-widest hover:scale-105 active:scale-95 transition"
                                    >
                                        Área ADM
                                    </button>
                                )}
                            </div>

                            <div className="card p-8 mb-10 flex items-center gap-6">
                                <div className="w-16 h-16 rounded-full bg-purple-900 flex items-center justify-center font-bold text-3xl font-tech">{user.name.charAt(0)}</div>
                                <div>
                                    <p className="text-zinc-600 text-[10px] uppercase mb-1">Membro Oficial</p>
                                    <h3 className="text-3xl font-bold">{user.name}</h3>
                                    <div className="text-sm font-black mt-1 text-yellow-600 font-tech">{user.score} <span className="text-zinc-500 font-normal">PTS</span></div>
                                </div>
                            </div>

                            <h3 className="text-zinc-600 text-[10px] uppercase mb-5 font-bold font-tech">Ranking Global</h3>
                            <div className="space-y-3">
                                {members.sort((a,b) => b.score - a.score).map((m, i) => (
                                    <div key={m.id} className="flex justify-between p-5 card items-center">
                                        <span className="text-sm font-bold text-zinc-300 flex items-center gap-3"><span className="text-zinc-700 font-black italic">#{i+1}</span>{m.name}</span>
                                        <span className="text-yellow-600 font-bold text-xs font-tech">{m.score}</span>
                                    </div>
                                ))}
                            </div>
                        </div>
                    )}

                    {view === 'ADMIN' && (
                        <div className="flex-1">
                            <div className="flex justify-between items-center mb-10">
                                <h2 className="font-bold gold-grad font-tech">Controle Total</h2>
                                <button onClick={() => setView('DASHBOARD')} className="text-xs font-bold text-zinc-600 underline">Voltar</button>
                            </div>
                            
                            <div className="space-y-4">
                                {members.map(m => (
                                    <div key={m.id} className="flex items-center justify-between p-5 card">
                                        <span className="font-bold text-sm">{m.name}</span>
                                        <div className="flex items-center gap-5">
                                            <button onClick={() => updateScore(m.id, -10)} className="w-10 h-10 bg-zinc-900 rounded-2xl flex items-center justify-center font-black text-xl hover:bg-zinc-800">-</button>
                                            <span className="w-10 text-center font-bold text-xs font-tech">{m.score}</span>
                                            <button onClick={() => updateScore(m.id, 10)} className="w-10 h-10 bg-gold text-black rounded-2xl flex items-center justify-center font-black text-xl hover:shadow-lg transition">+</button>
                                        </div>
                                    </div>
                                ))}
                            </div>

                            <button onClick={() => setMembers(INITIAL_MEMBERS)} className="w-full mt-12 border border-red-900/30 text-red-900/60 py-4 rounded-3xl text-[10px] font-black uppercase font-tech hover:bg-red-900/10 transition">Reiniciar Ranking</button>
                        </div>
                    )}

                </div>
            );
        }
        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
